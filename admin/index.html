<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });

        window.netlifyIdentity.on("open", function () {
          console.log("Netlify Identity widget opened");
        });

        window.netlifyIdentity.on("signup", function () {
          console.log("Signup event");
        });

        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });

        window.netlifyIdentity.on("error", function (err) {
          console.error("Netlify Identity error:", err);
        });

        if (
          window.location.hash &&
          (
            window.location.hash.includes("confirmation_token") ||
            window.location.hash.includes("invite_token") ||
            window.location.hash.includes("recovery_token")
          )
        ) {
          window.netlifyIdentity.open();
        }
      }
    </script>
  </body>
</html>
